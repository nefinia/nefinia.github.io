const pointer = {active:false,x:0,y:0};
function updatePointer(e){
  const r = canvas.getBoundingClientRect();
  pointer.x = (e.clientX-r.left)*dpr;
  pointer.y = (e.clientY-r.top)*dpr;
}
canvas.addEventListener("pointerdown", e=>{pointer.active=true;updatePointer(e);canvas.setPointerCapture(e.pointerId);});
canvas.addEventListener("pointermove", e=>{if(pointer.active) updatePointer(e);});
canvas.addEventListener("pointerup", e=>{pointer.active=false;canvas.releasePointerCapture(e.pointerId);});

  const k=e.key.toLowerCase();

  if(k==="arrowdown"||k==="s") keys.down=down;
  if(k==="arrowleft"||k==="a") keys.left=down;
  if(k==="arrowright"||k==="d") keys.right=down;
  if(["arrowup","arrowdown","arrowleft","arrowright","w","a","s","d"].includes(k)) e.preventDefault();
}

let difficultyKey = "normal";
let cfg = DIFFICULTY[difficultyKey];

function applyDifficulty(key){
  difficultyKey = DIFFICULTY[key] ? key : "normal";

  difficultyEl.value = difficultyKey;

const stars = [];
const holes = [];
const fuels = [];
let holeTimer = 0;
let speed = cfg.baseSpeed;
let fuel = 100;
let fuelTimer = 0;

function makeAstronautHorizontal(x,y){
  const pts=[];
  const links=[];
  const idx = {};
  const S = 1.1*dpr;

  function P(ax,ay){
    pts.push({x:ax,y:ay,vx:0,vy:0});
    return pts.length-1;
  }
  function link(i,j,restScale=1){
    const dx=pts[j].x-pts[i].x;
    const dy=pts[j].y-pts[i].y;
    const d=Math.hypot(dx,dy)*restScale;
    links.push([i,j,d]);
  }
  function chain(i,j,segments,restScale=1){
    if(segments<=0){
      link(i,j,restScale);
      return;
    }
    let prev=i;
    for(let s=1;s<=segments;s++){
      const t=s/(segments+1);
      const px=pts[i].x+(pts[j].x-pts[i].x)*t;
      const py=pts[i].y+(pts[j].y-pts[i].y)*t;
      const mid=P(px,py);
      link(prev,mid,restScale);
      prev=mid;
    }
    link(prev,j,restScale);
  }

  idx.head = P(x, y);
  idx.neck = P(x - 9*S, y);
  idx.shoulderL = P(x - 12*S, y - 9*S);
  idx.shoulderR = P(x - 12*S, y + 9*S);
  idx.elbowL = P(x - 26*S, y - 18*S);
  idx.elbowR = P(x - 26*S, y + 18*S);
  idx.handL = P(x - 40*S, y - 22*S);
  idx.handR = P(x - 40*S, y + 22*S);
  idx.chest = P(x - 22*S, y);
  idx.hip = P(x - 36*S, y);
  idx.kneeL = P(x - 54*S, y - 7*S);
  idx.kneeR = P(x - 54*S, y + 7*S);
  idx.footL = P(x - 72*S, y - 9*S);
  idx.footR = P(x - 72*S, y + 9*S);

  chain(idx.head, idx.neck, 1);
  chain(idx.neck, idx.chest, 2);
  chain(idx.chest, idx.hip, 2);

  chain(idx.neck, idx.shoulderL, 1);
  chain(idx.neck, idx.shoulderR, 1);
  chain(idx.shoulderL, idx.elbowL, 2);
  chain(idx.shoulderR, idx.elbowR, 2);
  chain(idx.elbowL, idx.handL, 1);
  chain(idx.elbowR, idx.handR, 1);
  link(idx.shoulderL, idx.shoulderR);

  chain(idx.hip, idx.kneeL, 2);
  chain(idx.hip, idx.kneeR, 2);
  chain(idx.kneeL, idx.footL, 1);
  chain(idx.kneeR, idx.footR, 1);
  link(idx.kneeL, idx.kneeR);

  link(idx.shoulderL, idx.hip, 1.02);
  link(idx.shoulderR, idx.hip, 1.02);
  link(idx.chest, idx.kneeL, 1.03);
  link(idx.chest, idx.kneeR, 1.03);

  const head = pts[idx.head];
  const foot = pts[idx.footL].x < pts[idx.footR].x ? pts[idx.footL] : pts[idx.footR];
  const restLen = Math.hypot(foot.x-head.x, foot.y-head.y);

  return {
    pts,
    links,
    idx,
    restLen,
    stretchRatio:1,
    stretchTime:0,
    swallowTime:0,
    trapMeter:0,
    deformPulse:0,
    orbitMeter:0,
    orbitLocked:false,
    orbitTimer:0,
    escapeMeter:0,
    orbitHole:null,
    escapeFlash:0
  };
}

function spawnHole(){
  const r = (cfg.holeRadiusMin + Math.random()*(cfg.holeRadiusMax - cfg.holeRadiusMin))*dpr;
  const y = 60*dpr + Math.random()*(H-120*dpr);
  holes.push({
    x: W+r+Math.random()*180*dpr,
    y,
    r,
    core: Math.max(cfg.coreMin, r*cfg.coreScale),
    horizon: r*cfg.horizonScale,
    orbit: r*cfg.orbitRadiusScale,
    warp: r*cfg.warpScale,
    influence: r*cfg.influenceScale,
    spin: Math.random()<0.5 ? -1 : 1
  });
}

function spawnFuel(){
  const r = 8*dpr;
  const y = 70*dpr + Math.random()*(H-140*dpr);
  fuels.push({x:W+r+Math.random()*220*dpr,y,r,spin:Math.random()*Math.PI*2});
}

function sampleGravityField(x,y){
  let ax = 0;
  let ay = 0;
  let nearest = Infinity;
  let nearestHole = null;
  for(let i=0;i<holes.length;i++){
    const h = holes[i];
    const dx = h.x - x;
    const dy = h.y - y;
    const r2 = dx*dx + dy*dy + SOFTEN*SOFTEN;
    const r = Math.sqrt(r2);
    const f = (cfg.gravity * h.r) / r2;
    ax += (dx / r) * f;
    ay += (dy / r) * f;
    const edge = r - h.r;
    if(edge < nearest){
      nearest = edge;
      nearestHole = h;
    }
  }
  return {ax, ay, nearest, nearestHole};
}

function warpPoint(x,y){
  if(holes.length===0) return {x, y};
  const field = sampleGravityField(x,y);
  if(!field.nearestHole) return {x, y};
  const mag = Math.hypot(field.ax, field.ay);
  if(mag < FIELD_EPS) return {x, y};
  const influence = field.nearestHole.influence;
  const localGain = cfg.gridWarpGain + field.nearestHole.warp*0.12;
  const nearFactor = Math.min(1, Math.max(0, (influence - field.nearest) / influence));
  const warp = Math.min(
    field.nearestHole.r * cfg.gridWarpMaxScale,
    mag * localGain * nearFactor
  );
  return {
    x: x + (field.ax / mag) * warp,
    y: y + (field.ay / mag) * warp
  };
}

function buildRenderPoints(rig){
  const src = rig.pts;
  const out = src.map(p=>({x:p.x, y:p.y}));
  const head = src[rig.idx.head];
  const field = sampleGravityField(head.x, head.y);
  const hole = (rig.orbitLocked && rig.orbitHole) ? rig.orbitHole : field.nearestHole;
  const pressure = hole
    ? Math.min(1, Math.max(0, (cfg.deformRadius - field.nearest) / cfg.deformRadius))
    : 0;
  const strength = Math.min(1, Math.max(rig.deformPulse, pressure) * 1.08);
  if(!hole || strength <= FIELD_EPS) return out;

  let cx = 0;
  let cy = 0;
  for(let i=0;i<out.length;i++){
    cx += out[i].x;
    cy += out[i].y;
  }
  cx /= out.length;
  cy /= out.length;

  const dx = hole.x - cx;
  const dy = hole.y - cy;
  const d = Math.hypot(dx,dy) || 1;
  const rx = dx / d;
  const ry = dy / d;
  const tx = -ry;
  const ty = rx;
  const rest = Math.max(1, rig.restLen);
  const longScale = 1 + strength * (cfg.deformLongMax * 1.75);
  const latScale = Math.max(0.10, 1 - strength * (cfg.deformLatShrink * 1.15));
  const wobbleAmp = (cfg.deformWobble || 0) * strength * 1.8 * dpr;
  const twist = (cfg.deformTwist || 0) * 1.15;

  for(let i=0;i<out.length;i++){
    const p = out[i];
    const relX = p.x - cx;
    const relY = p.y - cy;
    const along = relX*rx + relY*ry;
    const side = relX*tx + relY*ty;
    const alongN = Math.min(1.15, Math.abs(along) / rest);
    const pointLongScale = longScale * (1 + alongN * 0.35);
    const pointLatScale = Math.max(0.09, latScale * (1 - alongN * twist));
    const wobble = Math.sin(time*11 + i*0.85 + along*0.045) * wobbleAmp;
    p.x = cx + rx*(along*pointLongScale) + tx*(side*pointLatScale + wobble);
    p.y = cy + ry*(along*pointLongScale) + ty*(side*pointLatScale + wobble);
  }

  return out;
}

function update(dt){
  if(!running || paused) return;
  time += dt;
  speed = Math.min(cfg.maxSpeed, speed + dt*cfg.speedUp);
  distance += speed*dt;
  const hasManualInput = pointer.active || keys.up || keys.down || keys.left || keys.right;

  let tx = player.targetX;
  let ty = player.targetY;
  if(pointer.active){
    tx = pointer.x; ty = pointer.y;
  }else{
    const dirX = (keys.right?1:0) - (keys.left?1:0);
    const dirY = (keys.down?1:0) - (keys.up?1:0);
    tx += dirX * 520*dpr * dt;
    ty += dirY * 520*dpr * dt;
  }
  const margin = 50*dpr;
  tx = Math.max(margin, Math.min(W-margin, tx));
  ty = Math.max(margin, Math.min(H-margin, ty));
  player.targetX = tx; player.targetY = ty;

  stars.forEach(s=>{
    s.x -= speed * dt * 0.35;
    if(s.x < -10*dpr){ s.x = W + Math.random()*W*0.2; s.y = Math.random()*H; }
  });

  holeTimer -= dt;
  if(holeTimer<=0 && holes.length<cfg.holeLimit){
    spawnHole();
    holeTimer = cfg.holeSpawnMin + Math.random()*(cfg.holeSpawnMax - cfg.holeSpawnMin);
  }
  for(let i=holes.length-1;i>=0;i--){
    const h = holes[i];
    h.x -= speed * dt;
    if(h.x < -h.r*3) holes.splice(i,1);
  }

  fuelTimer -= dt;
  if(fuelTimer<=0 && fuels.length<cfg.fuelLimit){
    spawnFuel();
    fuelTimer = cfg.fuelSpawnMin + Math.random()*(cfg.fuelSpawnMax - cfg.fuelSpawnMin);
  }
  for(let i=fuels.length-1;i>=0;i--){
    const f = fuels[i];
    f.x -= speed * dt;
    f.spin += dt*2.2;
    if(f.x < -f.r*3) fuels.splice(i,1);
  }

  const rig = player.rig;
  const pts = rig.pts;
  const head = pts[rig.idx.head];
  const intentX = hasManualInput ? (player.targetX - head.x) : 0;
  const intentY = hasManualInput ? (player.targetY - head.y) : 0;
  const intentMag = hasManualInput ? Math.hypot(intentX, intentY) : 0;

  const headFieldBeforeMove = sampleGravityField(head.x, head.y);
  const controlPressure = Math.min(1, Math.max(0, (cfg.controlRadius - headFieldBeforeMove.nearest) / cfg.controlRadius));
  let controlScale = Math.max(cfg.controlSuppression, 1 - controlPressure*(1 - cfg.controlSuppression));

  if(rig.orbitLocked && rig.orbitHole){
    const hole = rig.orbitHole;
    const awayX = head.x - hole.x;
    const awayY = head.y - hole.y;
    const awayMag = Math.hypot(awayX, awayY) || 1;
    let awayDot = -1;
    if(intentMag > FIELD_EPS){
      awayDot = (intentX/intentMag) * (awayX/awayMag) + (intentY/intentMag) * (awayY/awayMag);
    }
    const boost = awayDot > 0.22 ? cfg.orbitEscapeBoost : 1;
    controlScale *= cfg.orbitControlSuppression * boost;
  }

  if(hasManualInput){
    // Control weakens near black holes, so escaping takes planning.
    const targetVX = (player.targetX - head.x) * cfg.controlGain * controlScale;
    const targetVY = (player.targetY - head.y) * cfg.controlGain * controlScale;
    player.ctrlVX += (targetVX - player.ctrlVX) * cfg.controlResponse;
    player.ctrlVY += (targetVY - player.ctrlVY) * cfg.controlResponse;
    const grabDrag = Math.max(0.5, 1 - controlPressure * cfg.trapGrab);
    player.ctrlVX *= grabDrag;
    player.ctrlVY *= grabDrag;
  }else{
    // With no input, stop steering and let the body follow geodesic-like flow.
    player.targetX = head.x;
    player.targetY = head.y;
    const idleDecay = Math.max(0, 1 - dt*(cfg.idleControlDecay || 9));
    player.ctrlVX *= idleDecay;
    player.ctrlVY *= idleDecay;
  }

  const dxMove = player.ctrlVX * dt;
  const dyMove = player.ctrlVY * dt;
  if(dxMove || dyMove){
    pts.forEach(p=>{ p.x += dxMove; p.y += dyMove; });
  }

  // Gravity per point (shared field model used by both physics and spacetime grid).
  const orbitHole = rig.orbitLocked ? rig.orbitHole : null;
  for(let i=0;i<pts.length;i++){
    const p = pts[i];
    const field = sampleGravityField(p.x, p.y);
    p.vx += field.ax * dt;
    p.vy += field.ay * dt;

    if(field.nearestHole){
      const h = field.nearestHole;
      const dx = h.x - p.x;
      const dy = h.y - p.y;
      const r = Math.hypot(dx,dy) || 1;
      const edge = r - h.r;
      if(edge < cfg.tangentialRadius){
        const swirl = Math.min(1, Math.max(0, (cfg.tangentialRadius - edge) / cfg.tangentialRadius));
        const tx = (-dy / r) * h.spin;
        const ty = ( dx / r) * h.spin;
        const tangential = ((cfg.gravity * h.r) / (r*r + SOFTEN*SOFTEN)) * cfg.tangentialStrength * swirl;
        p.vx += tx * tangential * dt;
        p.vy += ty * tangential * dt;
      }
    }

    if(orbitHole){
      const dx = orbitHole.x - p.x;
      const dy = orbitHole.y - p.y;
      const r = Math.hypot(dx,dy) || 1;
      const tx = (-dy / r) * orbitHole.spin;
      const ty = ( dx / r) * orbitHole.spin;
      const radialErr = r - orbitHole.orbit;
      p.vx += tx * cfg.orbitSpinStrength * dt;
      p.vy += ty * cfg.orbitSpinStrength * dt;
      p.vx += (dx / r) * (radialErr * cfg.orbitBandPull) * dt;
      p.vy += (dy / r) * (radialErr * cfg.orbitBandPull) * dt;
    }

    p.vx *= DAMP;
    p.vy *= DAMP;
    const v = Math.hypot(p.vx,p.vy);
    if(v > MAX_V){
      p.vx *= MAX_V/v;
      p.vy *= MAX_V/v;
    }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }

  // constraints
  for(let it=0; it<SOLVER_ITERS; it++){
    rig.links.forEach(([i,j,rest])=>{
      const p = pts[i];
      const q = pts[j];
      const dx = q.x - p.x;
      const dy = q.y - p.y;
      const d = Math.hypot(dx,dy) || 1;
      const diff = (d - rest) / d * SPRING_K;
      p.x += dx * diff * 0.5;
      p.y += dy * diff * 0.5;
      q.x -= dx * diff * 0.5;
      q.y -= dy * diff * 0.5;
    });
  }

  const headField = sampleGravityField(head.x, head.y);
  const nearestHole = headField.nearestHole;
  const nearest = headField.nearest;
  const passPressure = nearestHole
    ? Math.min(1, Math.max(0, (cfg.deformRadius - nearest) / cfg.deformRadius))
    : 0;

  if(passPressure > FIELD_EPS){
    rig.deformPulse = Math.min(1, rig.deformPulse + dt * cfg.deformPulseRise * (0.2 + passPressure));
    if(passPressure > 0.14 && rig.deformPulse < 0.38) rig.deformPulse = 0.38;
  }else{
    rig.deformPulse = Math.max(0, rig.deformPulse - dt * cfg.deformPulseDecay);
  }

  if(!rig.orbitLocked){
    if(nearestHole && nearest < nearestHole.orbit){
      const orbitPressure = Math.min(1, Math.max(0, (nearestHole.orbit - nearest) / nearestHole.orbit));
      rig.orbitMeter = Math.min(1.25, rig.orbitMeter + dt * cfg.orbitBuild * (0.35 + orbitPressure));
      if(rig.orbitMeter >= 1){
        rig.orbitLocked = true;
        rig.orbitHole = nearestHole;
        rig.orbitTimer = 0;
        rig.escapeMeter = 0;
        rig.deformPulse = Math.max(rig.deformPulse, 0.75);
      }
    }else{
      rig.orbitMeter = Math.max(0, rig.orbitMeter - dt * cfg.orbitDecay);
    }
  }else{
    if(!rig.orbitHole || holes.indexOf(rig.orbitHole) === -1){
      rig.orbitLocked = false;
      rig.orbitHole = null;
      rig.orbitMeter = 0;
      rig.orbitTimer = 0;
      rig.escapeMeter = 0;
    }else{
      rig.orbitTimer += dt;
      const hole = rig.orbitHole;
      const awayX = head.x - hole.x;
      const awayY = head.y - hole.y;
      const awayMag = Math.hypot(awayX, awayY) || 1;
      let awayDot = -1;
      if(intentMag > FIELD_EPS){
        awayDot = (intentX/intentMag) * (awayX/awayMag) + (intentY/intentMag) * (awayY/awayMag);
      }
      if(awayDot > 0.2 && intentMag > 24*dpr){
        rig.escapeMeter = Math.min(1.15, rig.escapeMeter + dt * cfg.orbitEscapeGain * awayDot);
      }else{
        rig.escapeMeter = Math.max(0, rig.escapeMeter - dt * cfg.orbitEscapeDecay);
      }

      if(rig.escapeMeter >= 1){
        rig.orbitLocked = false;
        rig.orbitHole = null;
        rig.orbitMeter = 0;
        rig.orbitTimer = 0;
        rig.escapeMeter = 0;
        rig.trapMeter = Math.max(0, rig.trapMeter - 0.25);
        rig.deformPulse = Math.max(rig.deformPulse, 0.55);
        rig.escapeFlash = 0.55;
        statusText = "Orbit Escaped";
      }else if(rig.orbitTimer > cfg.orbitFailTime){
        statusText = "Shredded in Orbit";
        running = false;
        return;
      }
    }
  }

  rig.escapeFlash = Math.max(0, rig.escapeFlash - dt);

  let deep = false;
  holes.forEach(h=>{
    for(let i=0;i<pts.length;i++){
      const p = pts[i];
      const d = Math.hypot(h.x - p.x, h.y - p.y);
      if(d < h.core){
        deep = true;
        break;
      }
    }
  });

  const trapPressure = Math.min(1, Math.max(0, (cfg.trapRadius - nearest) / cfg.trapRadius));
  if(trapPressure > rig.trapMeter){
    rig.trapMeter = Math.min(1, rig.trapMeter + dt * cfg.trapRise * (0.35 + trapPressure));
  }else{
    rig.trapMeter = Math.max(0, rig.trapMeter - dt * cfg.trapFall * (1.1 - trapPressure));
  }
  if(!deep){
    rig.swallowTime = Math.max(0, rig.swallowTime - dt*0.6);
  }else{
    rig.swallowTime += dt * (1 + rig.trapMeter*0.25);
  }
  if(rig.orbitLocked) rig.swallowTime += dt * 0.25;

  // fuel drain
  const gravityDrain = Math.max(0, (cfg.tideRadius - nearest) / cfg.tideRadius);
  fuel -= dt * (
    cfg.fuelBaseDrain +
    gravityDrain * cfg.fuelGravityDrain +
    rig.trapMeter * cfg.fuelTrapDrain +
    (rig.orbitLocked ? 2.2 : 0)
  );
  if(fuel <= 0){
    fuel = 0;
    statusText = "Out of Fuel";
    running = false;
    return;
  }

  // fuel pickup (any body point)
  for(let i=fuels.length-1;i>=0;i--){
    const f = fuels[i];
    let got = false;
    for(let j=0;j<pts.length;j++){
      const p = pts[j];
      const d = Math.hypot(f.x - p.x, f.y - p.y);
      if(d < f.r + 14*dpr){
        got = true;
        break;
      }
    }
    if(got){
      fuel = Math.min(100, fuel + cfg.fuelPickup);
      fuels.splice(i,1);
    }
  }

  const footL = pts[rig.idx.footL];
  const footR = pts[rig.idx.footR];
  const foot = footL.x < footR.x ? footL : footR;
  const length = Math.hypot(foot.x - head.x, foot.y - head.y);
  rig.stretchRatio = length / rig.restLen;

  if(nearest < cfg.tideRadius && rig.stretchRatio > cfg.stretchWarn){
    rig.stretchTime += dt;
  }else{
    rig.stretchTime = Math.max(0, rig.stretchTime - dt*1.6);
  }

  if(rig.swallowTime > cfg.swallowTime){
    statusText = "Swallowed";
    running = false;
    return;
  }
  if(nearest < cfg.tideRadius && rig.stretchRatio > cfg.stretchKill && rig.stretchTime > cfg.stretchTime){
    statusText = "Spaghettified";
    running = false;
    return;
  }

  if(rig.orbitLocked){
    const remain = Math.max(0, cfg.orbitFailTime - rig.orbitTimer);
    statusText = `Orbit Locked ${remain.toFixed(1)}s`;
  }else if(rig.escapeFlash > 0.01){
    statusText = "Orbit Escaped";
  }else if(rig.orbitMeter > 0.35){
    statusText = "Orbit Capture";
  }else if(rig.trapMeter > 0.72){
    statusText = "Trapped";
  }else if(nearest < cfg.tideRadius && rig.stretchRatio > cfg.stretchWarn){
    statusText = "Tidal Stress";
  }else if(rig.trapMeter > 0.35){
    statusText = "Unstable";
  }else{
    statusText = "Running";
  }
}

function strokeSmoothPath(points){
  if(points.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  if(points.length === 2){
    ctx.lineTo(points[1].x, points[1].y);
    ctx.stroke();
    return;
  }
  for(let i=1;i<points.length-1;i++){
    const mx = (points[i].x + points[i+1].x) * 0.5;
    const my = (points[i].y + points[i+1].y) * 0.5;
    ctx.quadraticCurveTo(points[i].x, points[i].y, mx, my);
  }
  const last = points[points.length-1];
  ctx.lineTo(last.x, last.y);
  ctx.stroke();
}

function sampleWarpedLine(vertical, fixed, step){
  const points = [];
  let sx = 0;
  let sy = 0;
  if(vertical){
    for(let y=0; y<=H; y+=step){
      const raw = warpPoint(fixed, y);
      if(points.length===0){
        sx = raw.x;
        sy = raw.y;
      }else{
        sx = sx*0.34 + raw.x*0.66;
        sy = sy*0.34 + raw.y*0.66;
      }
      points.push({x:sx,y:sy});
    }
  }else{
    for(let x=0; x<=W; x+=step){
      const raw = warpPoint(x, fixed);
      if(points.length===0){
        sx = raw.x;
        sy = raw.y;
      }else{
        sx = sx*0.34 + raw.x*0.66;
        sy = sy*0.34 + raw.y*0.66;
      }
      points.push({x:sx,y:sy});
    }
  }
  return points;
}

function drawGrid(){
  ctx.strokeStyle = "rgba(190,220,255,0.8)";
  ctx.lineWidth = 1.0*dpr;
  ctx.lineJoin = "round";
  ctx.lineCap = "round";
  const spacing = 10*dpr;
  const step = spacing/2.6;

  for(let gx=0; gx<=W; gx+=spacing){
    strokeSmoothPath(sampleWarpedLine(true, gx, step));
  }

  for(let gy=0; gy<=H; gy+=spacing){
    strokeSmoothPath(sampleWarpedLine(false, gy, step));
  }
}

function drawAstronaut(){
  const rig = player.rig;
  const p = buildRenderPoints(rig);
  const i = rig.idx;
  const head = p[i.head];
  const heat = Math.min(
    1,
    Math.max(0, (rig.stretchRatio-1.05)/0.9) +
    rig.trapMeter*0.45 +
    rig.deformPulse*0.55 +
    rig.escapeFlash*0.3 +
    (rig.orbitLocked ? 0.2 : 0)
  );

  p.forEach((pt,idx)=>{
    const base = idx===i.head ? 12.5*dpr : 8.8*dpr;
    const g = ctx.createRadialGradient(pt.x, pt.y, base*0.2, pt.x, pt.y, base*1.6);
    g.addColorStop(0,`rgba(255,255,255,${0.9+heat*0.1})`);
    g.addColorStop(0.5,"rgba(210,230,255,0.65)");
    g.addColorStop(1,"rgba(160,190,255,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(pt.x,pt.y,base*1.5,0,Math.PI*2);
    ctx.fill();
  });

  ctx.strokeStyle = `rgba(${200+55*heat},${220-80*heat},${255-140*heat},0.92)`;
  ctx.lineWidth = (2.1 + heat*1.6) * dpr;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.beginPath();
  rig.links.forEach(([i1,i2])=>{
    const p1 = p[i1], p2 = p[i2];
    ctx.moveTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
  });
  ctx.stroke();

  ctx.strokeStyle = "rgba(255,255,255,0.9)";
  ctx.lineWidth = 2*dpr;
  ctx.beginPath(); ctx.arc(head.x, head.y, 9.2*dpr, 0, Math.PI*2); ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = "#05060f";
  ctx.fillRect(0,0,W,H);
  const rig = player.rig;

  drawGrid();

  stars.forEach(s=>{
    ctx.globalAlpha = s.a;
    ctx.fillStyle = "rgba(210,225,255,1)";
    ctx.beginPath(); ctx.arc(s.x,s.y,s.s*dpr,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  holes.forEach(h=>{
    const horizon = h.horizon || h.r*1.6;
    const orbitR = h.orbit || h.r*3.0;
    const isOrbitTarget = rig && rig.orbitHole === h;
    const grad = ctx.createRadialGradient(h.x,h.y,h.r*0.1,h.x,h.y,h.r*5.0);
    grad.addColorStop(0,"#000");
    grad.addColorStop(0.5,"#000");
    grad.addColorStop(0.75,"rgba(120,170,255,0.22)");
    grad.addColorStop(1,"rgba(120,170,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r*5.0,0,Math.PI*2); ctx.fill();

    ctx.strokeStyle = "rgba(255,198,132,0.28)";
    ctx.lineWidth = 1.0*dpr;
    ctx.beginPath(); ctx.arc(h.x,h.y,horizon,0,Math.PI*2); ctx.stroke();

    ctx.setLineDash([4*dpr, 4*dpr]);
    ctx.strokeStyle = isOrbitTarget ? "rgba(255,130,96,0.95)" : "rgba(255,130,96,0.35)";
    ctx.lineWidth = isOrbitTarget ? 2.1*dpr : 1.1*dpr;
    ctx.beginPath(); ctx.arc(h.x,h.y,orbitR,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    if(isOrbitTarget){
      const pct = Math.min(1, Math.max(0, rig.escapeMeter));
      ctx.strokeStyle = "rgba(170,255,220,0.95)";
      ctx.lineWidth = 2.6*dpr;
      ctx.beginPath();
      ctx.arc(h.x, h.y, orbitR + 7*dpr, -Math.PI/2, -Math.PI/2 + pct*Math.PI*2);
      ctx.stroke();
    }

    ctx.strokeStyle = "rgba(140,190,255,0.55)";
    ctx.lineWidth = 1.4*dpr;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.r*1.1,0,Math.PI*2); ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.25)";
    ctx.lineWidth = 1.0*dpr;
    ctx.beginPath(); ctx.arc(h.x,h.y,h.core*1.35,0,Math.PI*2); ctx.stroke();

    ctx.fillStyle = "#000";
    ctx.beginPath(); ctx.arc(h.x,h.y,h.core,0,Math.PI*2); ctx.fill();
  });

  fuels.forEach(f=>{
    const g2 = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*3.2);
    g2.addColorStop(0,"rgba(160,255,210,0.95)");
    g2.addColorStop(0.6,"rgba(120,240,190,0.35)");
    g2.addColorStop(1,"rgba(120,240,190,0)");
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r*3.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(170,255,220,0.8)";
    ctx.lineWidth = 2*dpr;
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); ctx.stroke();
  });

  drawAstronaut();
}

let last = performance.now();
function loop(t){
  const dt = Math.min(0.05, (t-last)/1000);
  last = t;
  update(dt);
  draw();
  timeEl.textContent = time.toFixed(1);
  distEl.textContent = Math.floor(distance/120/dpr);
  fuelEl.textContent = Math.max(0, Math.round(fuel));
  trapEl.textContent = `${Math.round((player.rig ? player.rig.trapMeter : 0) * 100)}%`;
  statusEl.textContent = paused ? "Paused" : statusText;
  requestAnimationFrame(loop);
}
loop(last);

const pauseBtn = document.getElementById("pause");
const resetBtn = document.getElementById("reset");
pauseBtn.onclick = ()=>{ paused = !paused; if(!paused && running) statusText = "Running"; };
resetBtn.onclick = ()=>{ resetGame(); };
difficultyEl.onchange = ()=>{
  applyDifficulty(difficultyEl.value);
  resetGame();
};
</script>
